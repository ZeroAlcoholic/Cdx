project:
  name: quant-rl-mvp
  symbol: SPY
  frequency: 1d
  timezone: America/New_York

trading:
  initial_cash: 1000000
  fee_bps: 1.0
  slippage_bps: 2.0
  decision_time: "t_close"
  execution_time: "tplus1_open"
  action_space: [-1, 0, 1]

features:
  enable_dxy: true
  rsi_window: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9

risk_overlay:
  max_long: 1
  max_short: -1
  high_vol_threshold: 0.03
  high_vol_scale: 0.5
  max_drawdown_stop: 0.2

training:
  random_seed: 42
  train_start: "2012-01-01"
  valid_start: "2019-01-01"
  test_start: "2022-01-01"
  checkpoint_dir: "checkpoints"
